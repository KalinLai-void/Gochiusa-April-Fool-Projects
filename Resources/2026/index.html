<!doctype html>
<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Gochiusa 2026「Magical Order Rabbit」Songs</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="css/styles.css" />

    <script src="js/tailwind-config.js"></script>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  </head>

  <body
    class="bg-background font-body text-on-surface min-h-screen flex flex-col"
  >
    <main class="flex-grow flex items-center justify-center px-4 py-8 md:py-12">
      <div
        class="relative w-full max-w-sm md:max-w-md bg-surface-container-lowest rounded-[1.5rem] md:rounded-[2rem] p-6 md:p-8 shadow-[0_20px_40px_rgba(45,52,53,0.04)] transition-all hover:shadow-[0_30px_60px_rgba(45,52,53,0.08)]"
      >
        <div class="w-full mb-6 md:mb-10 group relative">
          <img
            alt=""
            class="w-full h-full object-cover rounded-lg shadow-xl shadow-surface-variant transition-all duration-500 transform group-hover:scale-[1.02]"
            id="album-art"
          />
        </div>

        <div class="flex flex-col gap-1 mb-6 md:mb-8">
          <h1
            class="font-headline text-2xl md:text-3xl font-extrabold tracking-tight text-on-surface truncate"
            id="song-title"
          ></h1>
          <p
            class="font-body text-base md:text-lg text-on-surface-variant font-medium opacity-70 truncate"
            id="artist-name"
          ></p>
        </div>

        <div class="mb-6 md:mb-10">
          <label
            class="block text-[10px] font-bold uppercase tracking-[0.2em] text-outline mb-3 ml-1"
            for="song-selector"
            >Select Songs</label
          >
          <div class="relative group">
            <select
              class="w-full bg-surface-container-low border-none rounded-xl py-3 md:py-4 px-4 md:px-5 appearance-none font-body text-on-surface text-sm font-semibold focus:ring-2 focus:ring-surface-variant transition-all cursor-pointer"
              id="song-selector"
            >
              <option value="" default>--- Select songs ---</option>
              <option value="chino">
                全天候型いらっしゃいませ — チノ（Chino）
              </option>
              <option value="rize">Rabbit Hole — レゼ（Rize）</option>
              <option value="chiya">
                のんピースマイペース — 千夜（Chiya）
              </option>
              <option value="syaro">
                ポップコーンはぷにんぐ！ — シャロ（Syaro）
              </option>
            </select>
          </div>
        </div>

        <div
          class="pt-6 border-t border-surface-container-highest flex flex-col gap-4"
        >
          <div class="mt-4 md:mt-6">
            <audio class="w-full h-8" controls id="audio-player">
              <source id="audio-source" src="" type="audio/mpeg" />
              Your browser does not support the audio element.
            </audio>
          </div>
        </div>
      </div>
    </main>

    <a href="../../">
      <nav
        class="sticky bottom-0 left-0 w-full flex justify-around items-center px-4 pt-4 pb-6 bg-[#FFFFFF]/80 dark:bg-[#1A1A1A]/80 backdrop-blur-xl shadow-[0_-10px_30px_rgba(45,52,53,0.04)] z-50 rounded-t-[1.5rem]"
      >
        <p style="color: white">Back</p>
      </nav>
    </a>

    <script src="js/script.js"></script>
  </body>
</html>
